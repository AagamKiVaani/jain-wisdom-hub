name: Jain Wisdom Scheduler

on:
  schedule:
    # 5:30 AM IST → 00:00 UTC
    - cron: '0 0 * * *'
    # 7:30 AM IST → 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run manually? (tithi / quote / both)'
        required: false
        default: 'both'

jobs:
  tithi-check:
    runs-on: ubuntu-latest
    if: |
      github.event.schedule == '0 0 * * *' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Trigger Morning Tithi Check
        run: |
           curl --fail -m 30 -X GET \
            -H "Authorization: Bearer ${{ secrets.AAGAM_CRON_KEY }}" \
            https://jain-wisdom-hub.vercel.app/api/cron/tithi

  daily-quote:
    runs-on: ubuntu-latest
    if: |
      github.event.schedule == '0 2 * * *' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Trigger Morning Quote
        run: |
           curl --fail -m 30 -X GET \
            -H "Authorization: Bearer ${{ secrets.AAGAM_CRON_KEY }}" \
            https://jain-wisdom-hub.vercel.app/api/cron/daily-quote